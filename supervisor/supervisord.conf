[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/langfuse/supervisord.pid
childlogdir=/run/langfuse

[unix_http_server]
file=/run/langfuse/supervisor.sock

[supervisorctl]
serverurl=unix:///run/langfuse/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[include]
files = /etc/supervisor/conf.d/*.conf
